# CI workflow for the Voynich Transition Grammar repo.
#
# Runs on every push and pull request to main. Two jobs:
#   1. validate — cheap, fast. Checks that frozen datasets still match
#      their recorded checksums. Always runs.
#   2. test-canonical-values — runs the full pipeline and verifies the
#      published numbers still come out. Slower (~few minutes) but guards
#      against silent drift when code changes.
#
# If either job fails on main, the README's reproducibility claim is broken
# and should be treated as a release blocker.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  validate:
    name: Validate frozen datasets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No `cache: pip` here: this job does not run pip install, so the
          # pip cache directory is never created and post-job cache cleanup
          # would fail with "Cache folder path is retrieved for pip but
          # doesn't exist on disk: /home/runner/.cache/pip". The
          # test-canonical-values job below does install deps and keeps
          # pip caching enabled.

      - name: Verify dataset checksums
        run: python scripts/00_validate_datasets.py

  test-canonical-values:
    name: Run pipeline and verify canonical values
    runs-on: ubuntu-latest
    # Only run the expensive job if validate passes — no point running the
    # pipeline against corrupted data.
    needs: validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run full pipeline
        run: python run_all.py --skip-validate

      - name: Verify canonical values
        run: pytest tests/test_canonical_values.py -v

      - name: Upload results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: results-on-failure
          path: results/
          retention-days: 14
